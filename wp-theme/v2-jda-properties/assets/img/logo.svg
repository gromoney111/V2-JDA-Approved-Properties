<?xml version="1.0" encoding="UTF-8"?>
<!--
  V2 JDA Approved Properties — default logo (SVG fallback).
  This is used until you upload your real PNG/SVG via
  Appearance → Customize → Site Identity → Logo.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="V2 JDA Approved Properties">
  <defs>
    <linearGradient id="ringOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#cfd5dc"/>
      <stop offset="50%" stop-color="#8c95a0"/>
      <stop offset="100%" stop-color="#cfd5dc"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1c3f86"/>
      <stop offset="100%" stop-color="#0f2657"/>
    </linearGradient>
    <linearGradient id="twoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#c9ccd3"/>
      <stop offset="100%" stop-color="#7a808a"/>
    </linearGradient>
    <path id="bannerArc" d="M 96 312 A 160 160 0 0 0 416 312" fill="none"/>
  </defs>

  <!-- White background -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- Outer silver ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#ringOuter)" stroke-width="14"/>
  <!-- Inner blue ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#1c3f86" stroke-width="6"/>

  <!-- Big "V" -->
  <text x="186" y="290"
        font-family="'Playfair Display', Georgia, serif"
        font-size="220" font-weight="800" font-style="italic"
        text-anchor="middle"
        fill="url(#vGrad)">V</text>

  <!-- Big "2" -->
  <text x="320" y="290"
        font-family="'Playfair Display', Georgia, serif"
        font-size="220" font-weight="800"
        text-anchor="middle"
        fill="url(#twoGrad)">2</text>

  <!-- Small house silhouette below -->
  <g transform="translate(256 360)" fill="#1c3f86">
    <!-- roof -->
    <polygon points="-44,-8 0,-32 44,-8 44,-2 -44,-2"/>
    <!-- chimney -->
    <rect x="20" y="-26" width="8" height="10"/>
    <!-- body -->
    <rect x="-36" y="-2" width="72" height="22"/>
    <!-- door -->
    <rect x="-6" y="6" width="12" height="14" fill="#ffffff"/>
  </g>

  <!-- "JDA APPROVED PROPERTIES" arc text -->
  <text font-family="'Poppins', Arial, sans-serif"
        font-size="28" font-weight="700"
        fill="#1c3f86" letter-spacing="3">
    <textPath href="#bannerArc" startOffset="50%" text-anchor="middle">
      JDA APPROVED PROPERTIES
    </textPath>
  </text>
</svg>
